syntax = "proto2";
package pdf_proto;

import "modules/cff/cff.proto";  // structured CFF grammar for /FontFile3
import "modules/type3cache/type3_cache.proto";  // Type 3 cache lifecycle grammar

message Catalog {
  required uint32 pages_ref = 1;
}

message PageTree {
  repeated uint32 kids = 1;
}

message ContentStream {
  enum FilterType {
    NONE  = 0;  // raw bytes, no compression
    FLATE = 1;  // FlateDecode -- zlib/deflate (ISO 32000-1 s7.4.4)
  }
  optional FilterType filter          = 1 [default = NONE];
  optional bytes      raw_content     = 2;  // uncompressed payload; serializer compresses when FLATE
  // Delta added to the written /Length value. Positive = over-read, negative = under-read.
  optional sint32     length_delta    = 3 [default = 0];
  // When true and filter=FLATE: write raw_content directly as stream payload but keep
  // /Filter /FlateDecode in the dict -- xpdf receives arbitrary bytes into its zlib decoder.
  optional bool       skip_compression = 4 [default = false];
}

// P1.5: an embedded font program. To reach xpdf's FoFi parsers, the font's
// /FontDescriptor must carry /FontFile, /FontFile2, or /FontFile3 as an *indirect
// reference to a stream* (GfxFont.cc getFontType: dictLookupNF(...)->isRef()).
// xpdf then sniffs the bytes via FoFiIdentifier and dispatches to FoFiType1 /
// FoFiTrueType / FoFiType1C(CFF). The serializer emits the program as its own
// indirect stream object; `program` bytes are fuzzer-controlled.
message EmbeddedFontFile {
  enum Key {
    FONTFILE  = 0;  // /FontFile  -> Type1 (PFA/PFB)        -> FoFiType1
    FONTFILE2 = 1;  // /FontFile2 -> TrueType               -> FoFiTrueType
    FONTFILE3 = 2;  // /FontFile3 -> CFF / Type1C / OpenType -> FoFiType1C
  }
  optional Key    key          = 1 [default = FONTFILE];
  optional string subtype      = 2;  // /Subtype for FontFile3 (Type1C / CIDFontType0C / OpenType)
  optional sint32 length_delta = 4 [default = 0];  // /Length over/under-read on the program stream

  // Program source. Either an opaque blob (legacy raw-bytes surface -- FoFiIdentifier
  // sniffs + dispatches) OR a structured CFF the serializer compiles into byte-valid
  // Type1C. The structured form is what lets the grammar synthesize the specific
  // malformation opaque mutation cannot reach (self/cyclic callsubr).
  oneof source {
    bytes   program = 3;   // raw font-program bytes
    pdf_cff.CffFont cff = 5;   // structured Type1C -> compiled CFF (FoFiType1C::cvtGlyph)
  }
}

// (CffFont / Charstring / Op / Operator live in modules/cff/cff.proto,
// package pdf_cff, and are referenced above via that import.)

// P1.5: /FontDescriptor. Inline in the font dict (xpdf accepts inline or indirect).
// Numeric fields are plain clean integers for now -- near-valid token injection is
// deferred to a later step (build the full valid form first).
message FontDescriptor {
  optional int32 flags         = 1 [default = 4];     // /Flags (4 = Symbolic)
  optional int32 italic_angle  = 2 [default = 0];
  optional int32 ascent        = 3 [default = 700];
  optional int32 descent       = 4 [default = -200];
  optional int32 cap_height    = 5 [default = 700];
  optional int32 stem_v        = 6 [default = 80];
  optional int32 missing_width = 7 [default = 0];      // read in GfxFont::readFontDescriptor
  repeated int32 font_bbox     = 8;  // /FontBBox [a b c d]; emitted only when exactly 4 values
  optional EmbeddedFontFile font_file = 9;
}

// P1: dummy font. Parsed lazily by xpdf only when a content stream runs `Tf`,
// so the serializer emits a deterministic driver stream that references every
// font via `/Fk 12 Tf` -- forcing GfxFont::makeFont to run on each one.
// P1.5: an optional FontDescriptor carries an embedded program to reach FoFi.
message Font {
  enum Subtype {
    TYPE1    = 0;  // -> fontType1, Gfx8BitFont
    TRUETYPE = 1;  // -> fontTrueType, Gfx8BitFont
    TYPE3    = 2;  // -> fontType3, Gfx8BitFont
    TYPE0    = 3;  // -> fontCIDType*, GfxCIDFont
  }
  // Step A: 8-bit-font /Encoding /Differences entry. Models one [code /name] pair;
  // xpdf's Differences parser (GfxFont.cc:266) reads an int (sets current code) then
  // names (assign + increment). Emitting "code /name" per entry hits both branches.
  message EncodingDiff {
    optional uint32 code = 1;
    optional string name = 2 [default = "space"];
  }
  enum BaseEncoding {
    BASE_NONE  = 0;  // no /Encoding emitted
    STANDARD   = 1;  // /StandardEncoding
    WINANSI    = 2;  // /WinAnsiEncoding
    MACROMAN   = 3;  // /MacRomanEncoding
    MACEXPERT  = 4;  // /MacExpertEncoding
  }

  optional Subtype subtype     = 1 [default = TYPE1];
  optional string  base_font   = 2 [default = "Helvetica"];  // std-14 vs garbage -> builtin lookup vs substitution
  optional bool    omit_type    = 3 [default = false];       // drop /Type /Font    -> malformed-dict path
  optional bool    omit_subtype = 4 [default = false];       // drop /Subtype       -> fontUnknownType path
  optional FontDescriptor font_descriptor = 5;               // P1.5: embedded font program -> FoFi parsers ('descriptor' is a protobuf-reserved name)
  // Step A: 8-bit-font completion -- reaches Gfx8BitFont Encoding/Widths/ToUnicode parsing.
  optional BaseEncoding base_encoding = 6 [default = BASE_NONE];  // bare name, or /BaseEncoding inside /Encoding dict when differences present
  repeated EncodingDiff differences   = 7;  // /Encoding << /Differences [ code /name ... ] >>
  optional uint32 first_char          = 8;  // /FirstChar (when widths present)
  repeated int32  widths              = 9;  // /Widths [ ... ]; /LastChar = first_char + len - 1
  optional bytes  to_unicode          = 10; // /ToUnicode CMap program -> separate indirect stream -> readToUnicodeCMap

  // Step B: CID/composite (Type0) font. Used only when subtype = TYPE0. The serializer
  // emits the Type0 root dict (/Encoding + /DescendantFonts) plus a separate descendant
  // CIDFont object carrying /CIDSystemInfo, /CIDToGIDMap, /W, /DW, and (for CID) the
  // /FontDescriptor. Reaches GfxCIDFont: CIDToGIDMap stream reader + the /W width parser.
  message CidFont {
    enum CidSubtype {
      CIDFONTTYPE0 = 0;  // /CIDFontType0 (CFF-based)
      CIDFONTTYPE2 = 1;  // /CIDFontType2 (TrueType-based)
    }
    optional CidSubtype cid_subtype = 1 [default = CIDFONTTYPE2];
    optional string registry   = 2 [default = "Adobe"];      // /CIDSystemInfo /Registry
    optional string ordering   = 3 [default = "Identity"];   // /CIDSystemInfo /Ordering
    optional uint32 supplement = 4 [default = 0];            // /CIDSystemInfo /Supplement
    optional string encoding   = 5 [default = "Identity-H"]; // Type0 /Encoding (CMap name)
    // /CIDToGIDMap: when cid_to_gid_map_stream is set -> a stream of big-endian 2-byte GIDs
    // (GfxFont.cc:97 reader); otherwise the name /Identity.
    optional bytes  cid_to_gid_map_stream = 6;
    repeated int32  w  = 7;  // /W array (flat ints -> c_first c_last w form; GfxFont.cc:177 parser)
    optional int32  dw = 8 [default = 1000];                 // /DW default width
    // Descendant /FontDescriptor (reuses FontDescriptor incl. embedded program -> FoFi).
    optional FontDescriptor descendant_descriptor = 9;
  }
  optional CidFont cid = 11;
}

// P3: image XObject. Lazy like fonts -- a content-stream `Do` operator triggers
// Gfx::doImage, which builds the filter chain (makeFilter) and the rendering device
// pulls the pixels through it. The harness's FuzzOutputDev drains the stream so the
// decoder actually runs. `data` is written verbatim (never pre-compressed) so the
// fuzzer feeds controlled garbage straight to DCT/JPX/CCITT/LZW/Flate. width/height/
// bits are unclamped -> exercises the w*h*bpc allocation math (integer overflow).
message ImageXObject {
  enum Filter {
    RAW       = 0;  // no /Filter -- raw samples
    FLATE     = 1;  // /FlateDecode
    DCT       = 2;  // /DCTDecode      -> DCTStream (libjpeg)
    JPX       = 3;  // /JPXDecode      -> JPXStream (xpdf JPEG2000)
    CCITT     = 4;  // /CCITTFaxDecode -> CCITTFaxStream
    LZW       = 5;  // /LZWDecode      -> LZWStream
    RUNLENGTH = 6;  // /RunLengthDecode
  }
  enum ColorSpace { DEVICE_RGB = 0; DEVICE_GRAY = 1; DEVICE_CMYK = 2; }

  optional uint32     width              = 1 [default = 1];
  optional uint32     height             = 2 [default = 1];
  optional uint32     bits_per_component = 3 [default = 8];   // /BitsPerComponent
  optional Filter     filter             = 4 [default = RAW];
  optional ColorSpace color_space        = 5 [default = DEVICE_RGB];
  optional bool       image_mask         = 6 [default = false]; // /ImageMask true (no /ColorSpace)
  optional bytes      data               = 7;  // stream payload -> decoder
  optional sint32     length_delta       = 8 [default = 0];   // /Length over/under-read
}

message Page {
  optional float width  = 1 [default = 612];
  optional float height = 2 [default = 792];
  optional uint32 parent_ref = 3;
  repeated ContentStream content_streams = 4;  // 0=no stream, 1=/Contents N 0 R, N+=/Contents [...]
  repeated Font fonts = 5;  // referenced as /F0, /F1, ... in /Resources; driver stream forces makeFont
  repeated ImageXObject images = 6;  // referenced as /Im0, /Im1, ... in /Resources; driver runs `/Imk Do`
}

message IndirectObject {
  required uint32 number = 1;
  oneof body {
    Catalog   catalog   = 2;
    PageTree  page_tree = 3;
    Page      page      = 4;
  }
}

message PdfDocument {
  repeated Page pages = 1;
  repeated pdf_type3cache.Type3CacheDocument type3_cache_programs = 2;
}
